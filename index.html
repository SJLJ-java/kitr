<!DOCTYPE html>
<html>
    <head>
        <title>I think</title>
        <link rel="icon" type="image/x-icon" href="renicon.jpeg">

        <style>
            body {
                font-family: 'Comic sans';
                background-color:lightgreen;
                margin: 0;
            }
            .center{
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100dvh;
                margin: 0;
            }
            .cat{
                transform-origin: center;
                position:absolute;
                animation: moveH 7001ms linear infinite, moveV 6012ms linear infinite;
                transform:scale(0.5)
            }

            .backgroundText{
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
                font-size: 10vh;
            }

            .cornerText{
                bottom:1vh;
                left:1vw;
                position:absolute;
                margin:0;
            }

            @keyframes moveH {
                0%{left: calc(-80px);}
                50%{left: calc(100vw - 125px);}
                100%{left: calc(-80px);}
            }
            @keyframes moveV {
                0%{bottom: calc(0px - 60px);}
                50%{bottom: calc(100vh - 100px);}
                100%{bottom: calc(0px - 60px);}
            }
            @keyframes fall {
                from{
                    top:150vh;
                }
                to{
                    top:50vh;
                }
            }
        </style>

    </head>

    <body>

        <div class="cat" id="cat">
            <img src="maxwell.gif" alt="It is he" id="max" onclick=boom() style="cursor:crosshair">
        </div>
        <p class="cornerText" id="cornerText"></p>>

        <script>
            const backgroundText = document.createElement('header')
            const thinkButton = document.createElement("button")
            const cornerText = document.getElementById('cornerText')
            var maxwell = document.getElementById('max')
            var i=0
            var deathCount = 0

            function type(text, doClear, speed){
                typeInt = setInterval(() => {
                    if(i < text.length){
                        backgroundText.innerHTML += text.charAt(i);
                        i++;
                    }
                    else{
                        if(doClear == true){
                            setTimeout(() => {clear()},2000)
                        }
                        clearInterval(typeInt)
                    }
                },speed)
            }

            function clear(){
                clearInt = setInterval(() => {
                    if(i > 0){
                        backgroundText.innerHTML = backgroundText.innerHTML.slice(0,-1)
                        i--;
                    }
                    else{clearInterval(clearInt)}
                },150)
            }

            function boom(){
                
                cornerText.textContent += "|"
                let anims = document.getElementById("cat").getAnimations()
                backgroundText.classList.add('backgroundText')
                var audio = new Audio('explosion.mp3')
                deathCount ++
                maxwell.src = 'explosion.gif'
                maxwell.onclick = null
                anims.forEach(anim => anim.pause())
                audio.play()
                setTimeout(() =>{maxwell.hidden = 'true'},800)
                setTimeout(() => {
                    backgroundText.style.fontFamily="'Comic sans";
                    backgroundText.innerHTML = '<h1>MURDERER</h1>';
                    backgroundText.style.color = 'maroon';
                    document.body.prepend(backgroundText);
                    document.body.style.backgroundColor = 'black';
                },1000)

                setTimeout(() => {
                    i=0;
                    backgroundText.innerHTML = '';
                    if(deathCount < 4){
                        type("Just kidding, he's fine", true, 100);
                        backgroundText.style.fontFamily="'Times New Roman', Times, serif";
                        backgroundText.style.color = 'blue';
                        document.body.style.backgroundColor = 'lightgreen';
                        maxwell.removeAttribute('hidden');
                        maxwell.onclick = boom;
                        anims.forEach(anim => anim.play());
                        maxwell.src = 'maxwell.gif';
                    }
                    else if(deathCount < 5){
                        type("You should really stop doing that", true, 100);
                        backgroundText.style.fontFamily="'Times New Roman', Times, serif";
                        backgroundText.style.color = 'black';
                        document.body.style.backgroundColor = 'lightgreen';
                        maxwell.removeAttribute('hidden');
                        maxwell.onclick = boom;
                        anims.forEach(anim => anim.play());
                        maxwell.src = 'maxwell.gif';
                    }
                    else if(deathCount < 9){
                        type("STOP", true, 1000)
                        backgroundText.style.fontFamily="'Times New Roman', Times, serif";
                        backgroundText.style.color = 'black';
                        document.body.style.backgroundColor = 'lightgreen';
                        maxwell.removeAttribute('hidden');
                        maxwell.onclick = boom;
                        anims.forEach(anim => anim.play());
                        maxwell.src = 'maxwell.gif';
                    }
                    else{
                        type("You killed him. This will haunt you forever", false);
                        backgroundText.style.fontFamily="'Times New Roman', Times, serif";
                        anims.forEach(anim => anim.play());
                        backgroundText.style.color = 'maroon';
                        document.body.style.backgroundColor = 'lightgreen'
                    }
                },
                6000)
            }
        </script>
    </body>
</html>
